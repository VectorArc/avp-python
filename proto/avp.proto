syntax = "proto3";

package avp;

// --- Enums ---

enum PayloadType {
  HIDDEN_STATE = 0;
  KV_CACHE = 1;
}

enum CommunicationMode {
  LATENT = 0;
  JSON_MODE = 1;  // "JSON" is reserved in some protobuf implementations
}

enum DataType {
  FLOAT32 = 0;
  FLOAT16 = 1;
  BFLOAT16 = 2;
  INT8 = 3;
  // Reserved: FLOAT8 = 4; INT4 = 5;
}

// --- Metadata ---

// Metadata embedded in every AVP message, serialized via Protocol Buffers.
message Metadata {
  // Identity
  string session_id = 1;
  string source_agent_id = 2;
  string target_agent_id = 3;
  string model_id = 4;

  // Model structure
  uint32 hidden_dim = 5;
  uint32 num_layers = 6;

  // Payload info
  PayloadType payload_type = 7;
  DataType dtype = 8;
  repeated uint32 tensor_shape = 9;

  // Communication
  CommunicationMode mode = 10;
  optional string compression = 11;
  reserved 12;  // was transfer_mode in v0.1.0; retired, do not reuse
  string avp_map_id = 13;

  // Extensible
  map<string, string> extra = 14;

  // Integrity — CRC32 of pre-compression payload bytes (optional).
  // Omit (0) for same-process transfers where corruption is not a concern.
  // Decoders SHOULD verify when present and reject on mismatch.
  optional uint32 payload_checksum = 15;

}

// --- Responses ---

// Response returned by the /avp/v2/transmit endpoint.
message TransmitResponse {
  bool success = 1;
  optional string message = 2;
  optional string request_id = 3;
  map<string, string> extra = 4;
}
